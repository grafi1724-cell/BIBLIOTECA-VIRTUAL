    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #192854; --accent: #4eb4e1; --bg: #f4f9ff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 1400px; margin: 0 auto; }
        header { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 40px; }
        .main-logo { width: 180px; margin-bottom: 15px; }
        header h1 { font-size: 28px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .search-box { position: relative; max-width: 600px; margin: 0 auto 50px; }
        .search-box input { width: 100%; padding: 15px 55px; border-radius: 35px; border: 2px solid #ddd; outline: none; font-size: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .search-box i { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between; height: 340px; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .icon-wrapper { height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .icon-wrapper img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .card h3 { font-size: 14px; font-weight: 700; margin: 10px 0; line-height: 1.3; }
        .btn-view { background: #f0f7ff; color: var(--primary); padding: 8px; border-radius: 10px; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-top: auto; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); overflow-y: scroll; -webkit-overflow-scrolling: touch; }
        .modal-content { background: white; margin: 2% auto; padding: 40px; width: 90%; max-width: 1100px; border-radius: 25px; position: relative; }
        .close { position: absolute; right: 25px; top: 15px; font-size: 35px; cursor: pointer; }
        .landing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; margin-top: 30px; }
        .doc-item { background: #fff; border-radius: 15px; border: 1px solid #eee; padding: 15px; text-align: center; }
        .doc-cover-box { width: 100%; height: 250px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; background: #f9f9f9; border-radius: 8px; overflow: hidden; }
        .doc-cover-box img { max-width: 100%; max-height: 100%; object-fit: cover; }
        .doc-title { font-size: 12px; font-weight: 700; min-height: 40px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; color: #333; }
        .btn-pdf { display: block; background: var(--primary); color: white; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 11px; font-weight: bold; }

        /* ── Mejoras móvil / iOS ── */
        @media (max-width: 600px) {
            body { padding: 12px; }
            header h1 { font-size: 18px; }
            .main-logo { width: 120px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
            .card { height: auto; min-height: 260px; padding: 14px; }
            .icon-wrapper { height: 110px; }
            .modal-content { padding: 20px 15px; width: 95%; margin: 5% auto; }
            .landing-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .doc-cover-box { height: 180px; }
            .close { font-size: 28px; right: 15px; top: 10px; }
        }
    </style>
</head>

                { t: "Guía para el manejo de dengue y chinkunguya", img: "1P_y2XPwkhVadFN-IFTkwkp8L3s7cfpLK", pdf: "18k8ZE9-n2i_SqIMIn_HMVy-o0v_5rhYN" },
                { t: "Vigilancia y control de la malaria", img: "1SL4OnoisWUoxsxoE9V7-S7lkmXEfrjC0", pdf: "1qiWUxnfz8g7HFAZKR_avbJXeXhEfY0sZ" }
            ] 
        },        
        { name: "20. Programa de Salud Renal", id: "1aaTIfZCEUg_VsNGWRKldc6Sk-IsGNJ3o", docs: [] },
        { name: "21.  Programa de Prevención y Control de Infecciones", id: "19AdzpPH7a5Q7OhRFjkTetNAYwktUqRH_", docs: [] },
        { name: "22.  Programa de Salud Escolar", id: "1g3i2PO8NTltgA07yq2fFaHZTAJZG80n-", docs: [] },
        { name: "23.   Programa de Zoonosis", id: "1SNV8FOtwMw4xcR01GsKC-kwhO1DLKmrs", docs: [] }
    ];

    // Detecta iOS y abre el documento correctamente
    function abrirDoc(e, id) {
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS) {
            e.preventDefault();
            // En iOS abrimos la vista de preview que sí funciona en Safari
            window.location.href = `https://drive.google.com/file/d/${id}/preview`;
        }
        // En otros dispositivos deja que el href normal funcione
    }

    function renderCards() {
        const grid = document.getElementById('programGrid');
        grid.innerHTML = "";
        data.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openModal(index);
            const thumb = p.id ? `https://drive.google.com/thumbnail?id=${p.id}&sz=w500` : 'https://via.placeholder.com/300x300?text=MSPAS';
            card.innerHTML = `<div class="icon-wrapper"><img src="${thumb}"></div><h3>${p.name}</h3><div class="btn-view">Ver Documentos</div>`;
            grid.appendChild(card);
        });
    }

    function filterPrograms() {
        const searchInput = document.getElementById('searchInput');
        const term = searchInput.value
            .toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "");
        
        const grid = document.getElementById('programGrid');
        grid.innerHTML = "";

        if (term === "") {
            renderCards();
            return;
        }

        data.forEach((p, index) => {
            const nombreProg = p.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const matchPrograma = nombreProg.includes(term);
            
            const temasCoincidentes = p.docs.filter(doc => {
                const temaDoc = doc.t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                return temaDoc.includes(term);
            });

            if (matchPrograma || temasCoincidentes.length > 0) {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(index);
                
                const thumb = p.id ? `https://drive.google.com/thumbnail?id=${p.id}&sz=w500` : 'https://via.placeholder.com/300x300?text=MSPAS';
                
                let etiquetaExtra = "";
                if (!matchPrograma && temasCoincidentes.length > 0) {
                    etiquetaExtra = `
                        <div style="font-size:11px; color:#4eb4e1; font-weight:bold; margin-top:5px; background:#e1f5fe; border-radius:15px; padding:2px 10px; display:inline-block;">
                            <i class="fas fa-file-pdf"></i> Tema encontrado
                        </div>`;
                }

                card.innerHTML = `
                    <div class="icon-wrapper"><img src="${thumb}"></div>
                    <h3>${p.name}</h3>
                    ${etiquetaExtra}
                    <div class="btn-view">Ver Documentos</div>
                `;
                grid.appendChild(card);
            }
        });

        if (grid.innerHTML === "") {
            grid.innerHTML = `
                <div style="grid-column: 1/-1; text-align:center; padding:60px; color:#999;">
                    <i class="fas fa-search-minus" style="font-size:50px; margin-bottom:15px; opacity:0.3;"></i>
                    <p style="font-size:18px;">No encontramos programas o documentos relacionados.</p>
                </div>`;
        }
    }

    function openModal(idx) {
        const p = data[idx];
        document.getElementById('modalTitle').innerText = p.name;
        const container = document.getElementById('landingContent');
        
        // Limpiamos el contenedor y verificamos si hay documentos
        container.innerHTML = p.docs.length > 0 ? "" : "<p style='grid-column: 1/-1; text-align:center; padding: 20px;'>Próximamente archivos disponibles.</p>";
        
        p.docs.forEach(doc => {
            const docThumb = doc.img && doc.img !== "ID_IMAGEN" 
                ? `https://drive.google.com/thumbnail?id=${doc.img}&sz=w500` 
                : 'https://via.placeholder.com/200x300?text=PDF';

            container.innerHTML += `
                <div class="doc-item">
                    <div class="doc-cover-box"><img src="${docThumb}"></div>
                    <div class="doc-title">${doc.t}</div>
                    <a href="https://drive.google.com/file/d/${doc.pdf}/preview" target="_blank" onclick="abrirDoc(event, '${doc.pdf}')" class="btn-pdf">VER DOCUMENTO</a>
                </div>`;
        });

        // BOTÓN DE REGRESO AL MENÚ (Se añade al final de la lista de documentos)
        container.innerHTML += `
            <div style="grid-column: 1/-1; text-align:center; padding: 40px 0;">
                <button onclick="closeModal()" style="background:var(--primary); color:white; border:none; padding:15px 40px; border-radius:30px; cursor:pointer; font-weight:bold; font-size:16px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: inline-flex; align-items: center; gap: 10px;">
                    <i class="fas fa-arrow-left"></i> REGRESAR AL MENÚ PRINCIPAL
                </button>
            </div>`;

        document.getElementById('myModal').style.display = "block";
        document.body.style.overflow = "hidden"; // Evita que la página de fondo se mueva
    }

    function closeModal() {
        document.getElementById('myModal').style.display = "none";
        document.body.style.overflow = "auto"; // Devuelve el scroll a la página principal
    }

    // Cerrar el modal si el usuario hace clic fuera de la caja blanca
    window.onclick = function(event) {
        const modal = document.getElementById('myModal');
        if (event.target == modal) {
            closeModal();
        }
    }

    // Inicializar la carga de tarjetas al abrir la página
    renderCards();
</script>

<button onclick="window.scrollTo({top: 0, behavior: 'smooth'}); document.getElementById('searchInput').value=''; renderCards();" 
        style="position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 999; display: flex; align-items: center; justify-content: center;">
    <i class="fas fa-home" style="font-size: 20px;"></i>
</button>
